<!DOCTYPE html>
<html lang="ja">

<head>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>


</head>

<body>

    <div class="starting">
        <button onclick="gaming()">ゲーム開始</button>
    </div>
    <div class="showing">
        <p>最新ニュース</p>
        <p id="news"></p>
    </div>

    <div class="playingview">
        <div class="stock_all">
            <div class="stock" id="SKY_STOCK">
                <div class="stock_name">
                    <div>SKY</div>

                </div>

                <div class="stock_button">
                    <button class="buy_button">購入 </button>
                    <br>
                    <button class="sell_button">売る</button>
                </div>
                <div class="stock_data">

                    <div class="stock_price">
                        <span class="stock_money"></span>円
                    </div>
                    <div class="having">
                        <span class="stock_number"></span>株
                    </div>
                </div>
            </div>

            <div class="stock" id="NITTA">
                <div class="stock_name">
                    <div>NITTA</div>

                </div>

                <div class="stock_button">
                    <button class="buy_button">購入 </button>
                    <br>
                    <button class="sell_button">売る</button>
                </div>
                <div class="stock_data">

                    <div class="stock_price">
                        <span class="stock_money"></span>円
                    </div>
                    <div class="having">
                        <span class="stock_number"></span>株
                    </div>
                </div>
            </div>
            <div class="stock" id="TOYO">
                <div class="stock_name">
                    <div>TOYO</div>

                </div>

                <div class="stock_button">
                    <button class="buy_button">購入 </button>
                    <br>
                    <button class="sell_button">売る</button>
                </div>
                <div class="stock_data">

                    <div class="stock_price">
                        <span class="stock_money"></span>円
                    </div>
                    <div class="having">
                        <span class="stock_number"></span>株
                    </div>
                </div>
            </div>
            <div class="stock" id="ISC">
                <div class="stock_name">
                    <div>ISC</div>

                </div>

                <div class="stock_button">
                    <button class="buy_button">購入 </button>
                    <br>
                    <button class="sell_button">売る</button>
                </div>
                <div class="stock_data">

                    <div class="stock_price">
                        <span class="stock_money"></span>円
                    </div>
                    <div class="having">
                        <span class="stock_number"></span>株
                    </div>
                </div>
            </div>
        </div>
            
        <div class="timer">
            <span class="limit_time"></span>秒
        
        </div>
        <div class="date">
            DAY：<span class="day"></span>
        </div>
    </div>
    <div class="result">
        <div class="possession_money">

            総資産:<span class="possession_number"></span>円
        </div>
        <div class="resultprofit">
        
        
        </div>
        <div class="clear"style="display:none">
            ゲーム終了
        </div>
    </div>
    <div class="lineshow">
        <canvas id="lineChart"></canvas>
    </div>
</body>
<body>
    
    <script>
        let lineCtx = document.getElementById("lineChart");
        // 線グラフの設定
        let lineConfig = {
          type: 'line',
          data: {
            // ※labelとデータの関係は得にありません
            labels: ['0日目', '1日目', '2日目', '3日目', '4日目', '5日目'],
            datasets: [{
              label: '総資産',
              data: [1000000],
              borderColor: '#f88',
            }],
          },
          options: {
            scales: {
              // Y軸の最大値・最小値、目盛りの範囲などを設定する
              y: {
                suggestedMin: 0,
                suggestedMax: 2000000,
                ticks: {
                  stepSize: 1000000,
                }
              }
            },
          },
        };
        lineChart = new Chart(lineCtx, lineConfig);
    </script>
</body>


</html>
